<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Drift — connecting to Google Drive…</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #06040f;
      color: #c4b0ff;
      font-family: 'Space Mono', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 20px;
    }
    .logo { font-size: 48px; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
    h1 { font-size: 13px; letter-spacing: .2em; text-transform: uppercase; opacity: .7; }
    .status { font-size: 11px; opacity: .5; margin-top: 8px; }
    .token-box {
      width: 90%; max-width: 480px;
      padding: 12px; background: rgba(0,0,0,0.4);
      border: 1px solid rgba(148,100,220,0.4);
      border-radius: 8px; color: #c4b0ff;
      font-family: monospace; font-size: 11px;
      word-break: break-all; min-height: 60px;
      resize: none; margin-top: 8px;
    }
    .card {
      background: rgba(148,100,220,0.08);
      border: 1px solid rgba(148,100,220,0.3);
      border-radius: 10px; padding: 20px 24px;
      max-width: 480px; width: 90%;
      display: flex; flex-direction: column; gap: 10px;
    }
    .card p { font-size: 12px; opacity: .7; line-height: 1.7; }
    button {
      padding: 10px 16px;
      background: rgba(148,100,220,0.25);
      border: 1px solid rgba(148,100,220,0.5);
      border-radius: 6px; color: #c4b0ff;
      cursor: pointer; font-family: monospace;
      font-size: 12px; width: 100%;
    }
    button:hover { background: rgba(148,100,220,0.4); }
    .success { color: #9de0c8; }
  </style>
</head>
<body>
  <div class="logo">🌌</div>
  <h1>Drift</h1>
  <div class="status" id="status">Connecting…</div>

  <script>
    const hash   = new URLSearchParams(window.location.hash.slice(1));
    const token  = hash.get('access_token');
    const error  = hash.get('error');
    const status = document.getElementById('status');

    if (error) {
      status.textContent = 'Connection failed: ' + error;

    } else if (token) {
      // Store token in localStorage so Drift can poll for it
      // Use a key that includes the origin so Drift knows where to look
      try {
        localStorage.setItem('drift_gdrive_token', token);
        localStorage.setItem('drift_gdrive_token_ts', Date.now().toString());
      } catch(e) {}

      // Also try postMessage to opener
      if (window.opener) {
        try {
          window.opener.postMessage({ type: 'DRIFT_OAUTH_TOKEN', token }, '*');
        } catch(e) {}
      }

      // Also try BroadcastChannel
      try {
        const bc = new BroadcastChannel('drift_oauth');
        bc.postMessage({ type: 'DRIFT_OAUTH_TOKEN', token });
        setTimeout(() => bc.close(), 3000);
      } catch(e) {}

      status.innerHTML = '<span class="success">✓ Connected successfully</span>';

      // Show manual copy as fallback
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <p><strong>Switch back to the Drift tab.</strong> It should connect automatically within a few seconds.</p>
        <p>If Drift doesn't connect, copy the token below and paste it when Drift asks:</p>
        <textarea class="token-box" readonly>${token}</textarea>
        <button id="copyBtn">Copy token to clipboard</button>
      `;
      document.body.appendChild(card);

      document.getElementById('copyBtn').onclick = () => {
        navigator.clipboard.writeText(token)
          .then(() => { document.getElementById('copyBtn').textContent = '✓ Copied!'; })
          .catch(() => {
            const ta = card.querySelector('textarea');
            ta.select(); document.execCommand('copy');
            document.getElementById('copyBtn').textContent = '✓ Copied!';
          });
      };

    } else {
      status.textContent = 'Waiting for token…';
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = '<p>No token detected. Please try connecting Drive again from inside Drift.</p>';
      document.body.appendChild(card);
    }
  </script>
</body>
</html>
